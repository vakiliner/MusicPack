name: Отчет об ошибке
description: Создайте отчет об ошибке или неисправности
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Опишите ошибку
      description: Четкое и краткое описание ошибки
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Чтобы воспроизвести
      description: Действия по воспроизведению поведения
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Ожидаемое поведение
      description: Четкое и краткое описание того, что вы ожидаете
    validations:
      required: true
  - type: textarea
    id: current
    attributes:
      label: Текущее поведение
      description: Текущее поведение
    validations:
      required: true
  - type: textarea
    id: screenshots
    attributes:
      label: Скриншоты/Видео
      description: Если применимо, добавьте скриншоты или видео, чтобы помочь объяснить вашу проблему
    validations:
      required: false
  - type: textarea
    id: build-info
    attributes:
      label: Информация о сборке
      description: |-
        Какую версию мода вы используете? (Например 1.0.9)
        Версия Minecraft, на которой вы столкнулись с ошибкой? (Например 1.16.5)
        На каком загрузчике модов эта ошибка произошла? (Например Fabric)
        Версия загрузчика модов? (Например 0.18.6)
      placeholder: |-
        Версия мода: 1.0.9
        Версия Minecraft: 1.16.5
        Платформа: Fabric
        Версия Fabric: 0.18.6
      value: |-
        Версия мода: `1.0.9`
        Версия Minecraft: `1.16.5`
        Платформа: **Fabric**, **Forge**
        Версия Fabric Loader: `0.18.6`
        Версия Forge: `36.2.42`
    validations:
      required: true
